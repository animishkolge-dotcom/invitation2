<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0e0b09">
<title>Tell him what you want</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
–bg:#0e0b09;
–surface:#1a1410;
–surface2:#231c17;
–accent:#c9725a;
–accent-soft:rgba(201,114,90,0.12);
–accent2:#7a9e8a;
–gold:#c9a96e;
–ink:#f5ede6;
–ink-mid:#a89285;
–ink-dim:#6b5a52;
–border:rgba(255,255,255,0.08);
–border-warm:rgba(201,114,90,0.25);
}

html{scroll-behavior:smooth;background:#0e0b09}

body{
background:var(–bg);
font-family:‘DM Sans’,sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:32px 20px;
color:var(–ink);
overflow-x:hidden;
}

body::before{
content:’’;
position:fixed;inset:0;
background-image:url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 200 200’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.035’/%3E%3C/svg%3E”);
pointer-events:none;z-index:999;opacity:0.4;
}

:focus-visible{outline:2px solid var(–accent);outline-offset:3px;border-radius:6px}

.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;transition:opacity 2s ease}
.orb-1{width:600px;height:600px;background:rgba(201,114,90,0.07);top:-200px;right:-200px}
.orb-2{width:400px;height:400px;background:rgba(122,158,138,0.05);bottom:-100px;left:-100px}

.app{position:relative;z-index:1;width:100%;max-width:460px}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

.screen{display:none}
.screen.active{display:block}

/* ─── INTRO ─── */
#intro{
text-align:center;padding:20px 0 40px;
opacity:0;transform:translateY(24px);
transition:opacity 0.9s ease,transform 0.9s ease;
}
#intro.visible{opacity:1;transform:translateY(0)}

.intro-eyebrow{
font-size:10px;letter-spacing:5px;text-transform:uppercase;
color:var(–accent);font-weight:500;margin-bottom:44px;display:block;
}
.intro-headline{
font-family:‘Cormorant Garamond’,serif;
font-size:clamp(34px,8vw,46px);font-weight:300;
color:var(–ink);line-height:1.3;margin-bottom:32px;letter-spacing:-0.5px;
}
.intro-headline em{font-style:italic;color:var(–accent)}
.intro-divider{width:40px;height:1px;background:var(–border-warm);margin:0 auto 28px}
.intro-body{font-size:15px;color:var(–ink-mid);line-height:1.9;margin-bottom:52px;font-weight:300}

.begin-btn{
display:inline-flex;align-items:center;gap:12px;
background:var(–accent);color:white;border:none;border-radius:4px;
padding:17px 44px;font-family:‘DM Sans’,sans-serif;
font-size:12px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;
cursor:pointer;transition:all 0.3s ease;min-height:44px;
}
.begin-btn:hover{background:#be6248;transform:translateY(-2px);box-shadow:0 16px 48px rgba(201,114,90,0.3)}
.begin-btn .arrow{transition:transform 0.3s ease}
.begin-btn:hover .arrow{transform:translateX(5px)}

/* ─── QUIZ ─── */
.progress-track{
height:1px;background:var(–border);margin-bottom:48px;position:relative;
}
.progress-fill{
height:100%;background:var(–accent);
transition:width 0.7s cubic-bezier(0.4,0,0.2,1);
}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px}
.q-index{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(–ink-dim)}
.q-step-dots{display:flex;gap:6px}
.q-dot{width:5px;height:5px;border-radius:50%;background:var(–border);transition:background 0.3s ease,transform 0.3s ease}
.q-dot.done{background:var(–accent)}
.q-dot.active{background:var(–ink);transform:scale(1.3)}

.question-wrap{opacity:0;transform:translateY(20px);transition:opacity 0.5s ease,transform 0.5s ease}
.question-wrap.visible{opacity:1;transform:translateY(0)}
.question-wrap.exit{opacity:0;transform:translateY(-16px);transition:opacity 0.3s ease,transform 0.3s ease}

.q-label{
font-family:‘Cormorant Garamond’,serif;
font-size:clamp(22px,5vw,28px);font-weight:400;
color:var(–ink);line-height:1.4;margin-bottom:36px;letter-spacing:-0.3px;
}
.q-label em{font-style:italic;color:var(–accent)}

/* ─── CHOICE CARDS ─── */
.date-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px}
.date-card{
background:linear-gradient(145deg,#2a1f18,#1e1510);
border:1.5px solid rgba(255,255,255,0.06);
border-radius:20px;
padding:28px 20px;cursor:pointer;text-align:center;
transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
min-height:44px;width:100%;
box-shadow:0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}
.date-card:hover{
border-color:rgba(201,114,90,0.3);
transform:translateY(-3px);
box-shadow:0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
}
.date-card.picked{
background:linear-gradient(145deg,#3d2218,#2a1610);
border-color:var(–accent);
transform:translateY(-3px);
box-shadow:0 8px 32px rgba(201,114,90,0.25), inset 0 1px 0 rgba(201,114,90,0.15);
}
.date-num{font-family:‘Cormorant Garamond’,serif;font-size:44px;font-weight:300;color:var(–ink);line-height:1;display:block;margin-bottom:8px}
.date-card.picked .date-num{color:var(–accent)}
.date-wd{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(–accent);font-weight:500;display:block;margin-bottom:5px}
.date-mo{font-size:12px;color:var(–ink-dim);font-weight:300}

.tot-wrap{display:grid;grid-template-columns:1fr 28px 1fr;gap:10px;align-items:center}
.or-sep{text-align:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(–ink-dim)}
.tot-card{
background:linear-gradient(145deg,#2a1f18,#1e1510);
border:1.5px solid rgba(255,255,255,0.06);
border-radius:20px;
padding:28px 16px;cursor:pointer;text-align:center;
transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
position:relative;min-height:44px;width:100%;
box-shadow:0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}
.tot-card:hover{
border-color:rgba(201,114,90,0.3);
transform:translateY(-2px);
box-shadow:0 12px 40px rgba(0,0,0,0.5);
}
.tot-card.picked-a{
background:linear-gradient(145deg,#3d2218,#2a1610);
border-color:var(–accent);
transform:scale(1.03);
box-shadow:0 8px 32px rgba(201,114,90,0.3), inset 0 1px 0 rgba(201,114,90,0.15);
}
.tot-card.picked-b{
background:linear-gradient(145deg,#1e2d26,#161f1b);
border-color:var(–accent2);
transform:scale(1.03);
box-shadow:0 8px 32px rgba(122,158,138,0.2), inset 0 1px 0 rgba(122,158,138,0.1);
}
.tot-card.dimmed{opacity:0.25;transform:scale(0.96);filter:saturate(0.3)}
.tot-icon{font-size:32px;display:block;margin-bottom:12px}
.tot-name{font-size:14px;font-weight:500;color:var(–ink);display:block;margin-bottom:4px}
.tot-hint{font-size:11px;color:var(–ink-mid);font-weight:300}
.pick-mark{
position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;
background:var(–accent);display:none;align-items:center;justify-content:center;
font-size:10px;color:white;
box-shadow:0 2px 8px rgba(201,114,90,0.5);
}
.picked-a .pick-mark,.picked-b .pick-mark{display:flex}
.picked-b .pick-mark{background:var(–accent2)}

.multi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.multi-card{
background:linear-gradient(145deg,#2a1f18,#1e1510);
border:1.5px solid rgba(255,255,255,0.06);
border-radius:20px;
padding:24px 14px;cursor:pointer;text-align:center;
transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
min-height:44px;width:100%;
box-shadow:0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}
.multi-card:hover{
border-color:rgba(201,114,90,0.3);
transform:translateY(-2px);
box-shadow:0 12px 40px rgba(0,0,0,0.5);
}
.multi-card.picked{
background:linear-gradient(145deg,#3d2218,#2a1610);
border-color:var(–accent);
transform:translateY(-2px);
box-shadow:0 8px 32px rgba(201,114,90,0.3), inset 0 1px 0 rgba(201,114,90,0.15);
}
.mc-icon{font-size:28px;display:block;margin-bottom:10px}
.mc-name{font-size:14px;font-weight:500;color:var(–ink);display:block;margin-bottom:4px}
.mc-hint{font-size:12px;color:var(–ink-mid);font-weight:300}

.choc-follow{
margin-top:28px;opacity:0;transform:translateY(10px);
transition:opacity 0.4s ease 0.1s,transform 0.4s ease 0.1s;pointer-events:none;
}
.choc-follow.visible{opacity:1;transform:translateY(0);pointer-events:all}
.choc-label{font-family:‘Cormorant Garamond’,serif;font-style:italic;font-size:16px;color:var(–ink-mid);text-align:center;margin-bottom:16px;display:block}
.choc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.choc-card{
background:linear-gradient(145deg,#2a1f18,#1e1510);
border:1.5px solid rgba(255,255,255,0.06);
border-radius:16px;
padding:16px 10px;cursor:pointer;text-align:center;
transition:all 0.3s ease;min-height:44px;width:100%;
box-shadow:0 4px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
}
.choc-card:hover{border-color:rgba(201,114,90,0.3);transform:translateY(-2px)}
.choc-card.picked{
background:linear-gradient(145deg,#3d2218,#2a1610);
border-color:var(–accent);
box-shadow:0 6px 24px rgba(201,114,90,0.25), inset 0 1px 0 rgba(201,114,90,0.12);
}
.choc-icon{font-size:22px;display:block;margin-bottom:8px}
.choc-name{font-size:12px;font-weight:500;color:var(–ink);display:block;margin-bottom:2px}
.choc-hint{font-size:10px;color:var(–ink-mid)}

.open-field{
width:100%;
background:linear-gradient(145deg,#2a1f18,#1e1510);
border:1.5px solid rgba(255,255,255,0.06);
border-radius:16px;padding:20px;font-family:‘DM Sans’,sans-serif;
font-size:15px;font-weight:300;color:var(–ink);outline:none;resize:none;
transition:border-color 0.3s ease,box-shadow 0.3s ease;line-height:1.7;
box-shadow:0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
}
.open-field:focus{border-color:var(–accent);box-shadow:0 0 0 3px rgba(201,114,90,0.12)}
.open-field::placeholder{color:var(–ink-dim);font-style:italic}

.next-btn{
display:block;width:100%;margin-top:24px;padding:18px;
background:linear-gradient(135deg,#2a1f18,#231a14);
color:var(–ink-mid);
border:1.5px solid rgba(255,255,255,0.08);
border-radius:14px;
font-family:‘DM Sans’,sans-serif;font-size:12px;font-weight:500;
letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;
transition:all 0.3s ease;opacity:0;pointer-events:none;min-height:52px;
box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.next-btn.ready{
opacity:1;pointer-events:all;
background:var(–accent);
color:white;
border-color:transparent;
box-shadow:0 8px 32px rgba(201,114,90,0.35);
}
.next-btn.ready:hover{
background:#be6248;
transform:translateY(-2px);
box-shadow:0 12px 40px rgba(201,114,90,0.45);
}
.next-btn.ready:active{transform:translateY(0);box-shadow:0 4px 16px rgba(201,114,90,0.3)}

/* ─── THINKING ─── */
#thinking{text-align:center;padding:80px 0;opacity:0;transition:opacity 0.6s ease}
#thinking.visible{opacity:1}
.thinking-dots{display:flex;gap:8px;justify-content:center;margin-bottom:32px}
.thinking-dot{
width:6px;height:6px;border-radius:50%;background:var(–accent);
animation:pulse-dot 1.4s ease-in-out infinite;
}
.thinking-dot:nth-child(2){animation-delay:0.2s}
.thinking-dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse-dot{
0%,80%,100%{transform:scale(0.6);opacity:0.3}
40%{transform:scale(1);opacity:1}
}
.thinking-text{
font-family:‘Cormorant Garamond’,serif;font-style:italic;
font-size:20px;color:var(–ink-mid);font-weight:300;line-height:1.7;
}

/* ─── RESULT — LETTER ─── */
#result{display:none}

.plan-reveal{
opacity:0;transform:translateY(24px);
transition:opacity 0.8s ease,transform 0.8s ease;
}
.plan-reveal.visible{opacity:1;transform:translateY(0)}

/* Letter wrapper */
.letter-wrapper{
position:relative;
background:linear-gradient(160deg,#1e1610 0%,#16100c 60%,#1a1209 100%);
border:1px solid rgba(201,114,90,0.2);
border-radius:20px;
padding:44px 36px 52px;
margin-bottom:20px;
overflow:hidden;
box-shadow:0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,114,90,0.1);
}

/* parchment texture overlay */
.letter-wrapper::before{
content:’’;
position:absolute;inset:0;
background-image:url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 300 300’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘t’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.65’ numOctaves=‘3’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23t)’ opacity=‘0.03’/%3E%3C/svg%3E”);
pointer-events:none;
border-radius:20px;
}

/* decorative top flourish */
.letter-flourish-top{
text-align:center;
margin-bottom:32px;
position:relative;
}
.letter-flourish-top::before,
.letter-flourish-top::after{
content:’’;
display:inline-block;
width:60px;height:1px;
background:linear-gradient(90deg,transparent,var(–accent));
vertical-align:middle;
margin:0 14px;
}
.letter-flourish-top::after{
background:linear-gradient(90deg,var(–accent),transparent);
}
.letter-flourish-icon{
display:inline-block;
font-size:18px;
vertical-align:middle;
animation:gentle-sway 3s ease-in-out infinite;
}
@keyframes gentle-sway{
0%,100%{transform:rotate(-5deg)}
50%{transform:rotate(5deg)}
}

/* date line */
.letter-date-line{
font-size:11px;letter-spacing:3px;text-transform:uppercase;
color:var(–ink-dim);text-align:right;margin-bottom:28px;
font-family:‘DM Sans’,sans-serif;font-weight:300;
}

/* salutation */
.letter-salutation{
font-family:‘Cormorant Garamond’,serif;
font-size:22px;font-weight:400;
color:var(–ink);margin-bottom:24px;
font-style:italic;
}

/* body paragraphs */
.letter-body{
font-family:‘Cormorant Garamond’,serif;
font-size:17px;font-weight:300;
color:#c8b9ae;
line-height:2;
margin-bottom:0;
}
.letter-body p{
margin-bottom:20px;
opacity:0;transform:translateY(12px);
transition:opacity 0.6s ease,transform 0.6s ease;
}
.letter-body p.visible{opacity:1;transform:translateY(0)}
.letter-body strong{
color:var(–ink);font-weight:500;
}
.letter-body em{
color:var(–accent);font-style:italic;
}

/* divider before sign-off */
.letter-divider{
width:48px;height:1px;
background:var(–border-warm);
margin:32px 0 24px;
opacity:0;transition:opacity 0.6s ease;
}
.letter-divider.visible{opacity:1}

/* sign-off */
.letter-signoff{
font-family:‘Cormorant Garamond’,serif;
font-style:italic;font-size:16px;
color:var(–ink-mid);
margin-bottom:12px;
opacity:0;transform:translateY(10px);
transition:opacity 0.6s ease,transform 0.6s ease;
}
.letter-signoff.visible{opacity:1;transform:translateY(0)}

/* signature */
.letter-signature{
font-family:‘Pinyon Script’,cursive;
font-size:48px;
color:var(–accent);
line-height:1.2;
display:block;
opacity:0;transform:translateY(10px) scale(0.95);
transition:opacity 0.8s ease,transform 0.8s ease;
}
.letter-signature.visible{opacity:1;transform:translateY(0) scale(1)}

/* wax seal */
.wax-seal{
display:flex;flex-direction:column;align-items:center;
margin-top:28px;
opacity:0;transform:scale(0.5) rotate(-20deg);
transition:opacity 0.6s ease,transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.wax-seal.visible{opacity:1;transform:scale(1) rotate(0deg)}

.seal-btn{
background:none;border:none;cursor:pointer;
display:flex;flex-direction:column;align-items:center;gap:10px;
padding:8px;
}
.seal-btn:active .seal-circle{transform:scale(0.92)}

.seal-circle{
width:72px;height:72px;border-radius:50%;
background:radial-gradient(circle at 35% 35%,#c9725a,#8b3e28);
display:flex;align-items:center;justify-content:center;
font-size:28px;
box-shadow:0 4px 24px rgba(201,114,90,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
animation:seal-pulse 2.2s ease-in-out infinite;
transition:transform 0.15s ease;
}
@keyframes seal-pulse{
0%,100%{box-shadow:0 4px 24px rgba(201,114,90,0.5),inset 0 1px 0 rgba(255,255,255,0.15)}
50%{box-shadow:0 4px 40px rgba(201,114,90,0.85),inset 0 1px 0 rgba(255,255,255,0.15)}
}

.seal-hint{
font-size:10px;letter-spacing:3px;text-transform:uppercase;
color:var(–accent);font-weight:500;
animation:fade-blink 2.2s ease-in-out infinite;
}
@keyframes fade-blink{
0%,100%{opacity:0.5} 50%{opacity:1}
}

/* restart wrap */
.restart-wrap{
margin-top:20px;text-align:center;
opacity:0;transition:opacity 0.6s ease;
}
.restart-wrap.visible{opacity:1}

.restart-btn{
display:block;width:100%;padding:13px;
background:none;color:var(–ink-dim);
border:1px solid var(–border);border-radius:8px;
font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:400;
cursor:pointer;transition:all 0.3s ease;min-height:44px;
}
.restart-btn:hover{color:var(–ink);border-color:rgba(255,255,255,0.15)}

/* ─── TOAST ─── */
.toast{
position:fixed;bottom:32px;left:50%;
transform:translateX(-50%) translateY(20px);
background:var(–surface2);border:1px solid var(–border-warm);
color:var(–ink);padding:12px 28px;border-radius:100px;
font-size:13px;opacity:0;transition:all 0.4s ease;
z-index:100;white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(prefers-reduced-motion:reduce){
*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
</style>

</head>
<body>

<div aria-live="polite" aria-atomic="true" class="sr-only" id="sr-announce"></div>
<div class="orb orb-1" aria-hidden="true"></div>
<div class="orb orb-2" aria-hidden="true"></div>

<main class="app">

  <!-- INTRO -->

  <section id="intro" class="screen active" aria-labelledby="intro-heading">
    <span class="intro-eyebrow">He wants to know</span>
    <h1 class="intro-headline" id="intro-heading">
      Tell him exactly<br>what your <em>perfect evening</em><br>looks like.
    </h1>
    <div class="intro-divider" aria-hidden="true"></div>
    <p class="intro-body">
      Answer honestly.<br>
      He'll make it happen.
    </p>
    <button class="begin-btn" id="begin-btn" aria-label="Begin the quiz">
      Show him <span class="arrow" aria-hidden="true">→</span>
    </button>
  </section>

  <!-- QUIZ -->

  <section id="quiz" class="screen" aria-label="Evening planner questions">
    <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Quiz progress" id="progress-bar">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="q-meta">
      <span class="q-index" id="q-index" aria-label="Question 1 of 6">01 / 06</span>
      <div class="q-step-dots" id="q-dots" aria-hidden="true"></div>
    </div>
    <div id="q-slot"></div>
  </section>

  <!-- THINKING -->

  <section id="thinking" class="screen" aria-label="Building your evening">
    <div class="thinking-dots" aria-hidden="true">
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
    </div>
    <p class="thinking-text">Writing your invitation&hellip;<br>This one's just for you.</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
var FLOWERS=[
  {icon:'🌹',name:'Roses',      hint:'Classic, timeless', val:'roses'},
  {icon:'🌷',name:'Tulips',     hint:'Soft & graceful',   val:'tulips'},
  {icon:'🌸',name:'Peonies',    hint:'Full & romantic',   val:'peonies'},
  {icon:'🌻',name:'Sunflowers', hint:'Warm & joyful',     val:'sunflowers'},
  {icon:'💐',name:'Wildflowers',hint:'Free & unexpected', val:'wildflowers'}
];
var CHOC=[
  {icon:'🖤',name:'Dark', hint:'Bold & bitter',    val:'dark chocolate'},
  {icon:'🤎',name:'Milk', hint:'Smooth & classic', val:'milk chocolate'},
  {icon:'🤍',name:'White',hint:'Sweet & creamy',   val:'white chocolate'}
];

var QUESTIONS=[
  {
    id:'gift',type:'tot',chocSub:true,
    label:'He\'s at your door. What are you quietly hoping he brought?',
    left: {icon:'💐',name:'Flowers',   hint:'Something beautiful',val:'flowers'},
    right:{icon:'🍫',name:'Chocolates',hint:'Something indulgent', val:'chocolates'}
  },
  {
    id:'color',type:'multi',
    label:'Which of these feels like your mood tonight?',
    opts:[
      {icon:'🧡',name:'Warm', hint:'Golden, earthy',  val:'warm and golden'},
      {icon:'💙',name:'Cool', hint:'Calm, serene',    val:'cool and calm'},
      {icon:'🌸',name:'Soft', hint:'Blush, romantic', val:'soft and romantic'},
      {icon:'🍷',name:'Deep', hint:'Rich, intimate',  val:'deep and intimate'}
    ]
  },
  {
    id:'food',type:'multi',
    label:'You get to pick the restaurant. What wins tonight?',
    opts:[
      {icon:'🍝',name:'Italian',    hint:'Pasta, warmth',    val:'Italian'},
      {icon:'🍱',name:'Asian',      hint:'Sushi or Thai',    val:'Asian'},
      {icon:'🍛',name:'Indian',     hint:'Spiced, fragrant', val:'Indian'},
      {icon:'🥩',name:'Continental',hint:'Steaks, tapas',    val:'Continental'}
    ]
  },
  {
    id:'timing',type:'tot',chocSub:false,
    label:'A perfect evening — how does it start for you?',
    left: {icon:'🚶',name:'A walk first',       hint:'Easy, unhurried',      val:'walk'},
    right:{icon:'🕯️',name:'Straight to dinner',hint:'Table, candles, menu', val:'dinner'}
  },
  {
    id:'date',type:'date',
    label:'When would you want this to happen?',
    dates:[
      {num:'25',wd:'Friday',  mo:'April',val:'Friday, 25th April'},
      {num:'26',wd:'Saturday',mo:'April',val:'Saturday, 26th April'}
    ]
  },
  {
    id:'happy',type:'open',
    label:'One last thing — what\'s a small detail that would make it feel perfect to you?',
    placeholder:'a song playing, a specific dessert, walking home after...'
  }
];

var answers={};
var currentQ=0;
var TOTAL=QUESTIONS.length;

function announce(msg){
  var el=document.getElementById('sr-announce');
  el.textContent='';
  setTimeout(function(){el.textContent=msg;},50);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){
    s.classList.remove('active');s.style.display='none';
    s.setAttribute('aria-hidden','true');
  });
  var el=document.getElementById(id);
  el.style.display='block';el.classList.add('active');
  el.removeAttribute('aria-hidden');
}

document.getElementById('begin-btn').addEventListener('click',function(){
  showScreen('quiz');buildDots();renderQuestion();
});
setTimeout(function(){
  var intro=document.getElementById('intro');
  intro.style.display='block';intro.classList.add('active');
  intro.removeAttribute('aria-hidden');
  setTimeout(function(){intro.classList.add('visible');},80);
},100);

function buildDots(){
  var c=document.getElementById('q-dots');c.innerHTML='';
  for(var i=0;i<TOTAL;i++){
    var d=document.createElement('div');d.className='q-dot';d.id='dot-'+i;c.appendChild(d);
  }
}
function updateDots(idx){
  for(var i=0;i<TOTAL;i++){
    var d=document.getElementById('dot-'+i);if(!d)continue;
    d.className='q-dot'+(i<idx?' done':i===idx?' active':'');
  }
}

function renderQuestion(){
  var q=QUESTIONS[currentQ];
  var pct=Math.round((currentQ/TOTAL)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('progress-bar').setAttribute('aria-valuenow',pct);
  var qn=currentQ+1;
  var ix=document.getElementById('q-index');
  ix.textContent=(qn<10?'0':'')+qn+' / '+(TOTAL<10?'0':'')+TOTAL;
  ix.setAttribute('aria-label','Question '+qn+' of '+TOTAL);
  updateDots(currentQ);
  announce('Question '+qn+' of '+TOTAL+': '+q.label);
  var slot=document.getElementById('q-slot');
  var ex=slot.querySelector('.question-wrap');
  if(ex){ex.classList.add('exit');setTimeout(function(){slot.innerHTML='';injectQuestion(slot,q);},280);}
  else{injectQuestion(slot,q);}
}

function injectQuestion(slot,q){
  var wrap=document.createElement('div');wrap.className='question-wrap';
  var lbl=document.createElement('h2');lbl.className='q-label';lbl.textContent=q.label;
  wrap.appendChild(lbl);
  if(q.type==='date')       buildDateQ(wrap,q);
  else if(q.type==='tot')   buildTotQ(wrap,q);
  else if(q.type==='multi') buildMultiQ(wrap,q);
  else                       buildOpenQ(wrap,q);
  slot.appendChild(wrap);
  requestAnimationFrame(function(){requestAnimationFrame(function(){wrap.classList.add('visible');});});
}

function buildDateQ(wrap,q){
  var fs=document.createElement('fieldset');fs.style.cssText='border:none;padding:0';
  var lg=document.createElement('legend');lg.className='sr-only';lg.textContent='Choose a date';fs.appendChild(lg);
  var grid=document.createElement('div');grid.className='date-grid';
  q.dates.forEach(function(d,i){
    var btn=document.createElement('button');
    btn.className='date-card';btn.id='dc-'+i;btn.setAttribute('type','button');
    btn.setAttribute('aria-pressed','false');btn.setAttribute('aria-label',d.wd+' '+d.num+' '+d.mo);
    btn.innerHTML='<span class="date-num" aria-hidden="true">'+d.num+'</span><span class="date-wd" aria-hidden="true">'+d.wd+'</span><span class="date-mo" aria-hidden="true">'+d.mo+'</span>';
    btn.addEventListener('click',function(){
      q.dates.forEach(function(_,j){
        var el=document.getElementById('dc-'+j);
        if(el){el.className='date-card'+(j===i?' picked':'');el.setAttribute('aria-pressed',j===i?'true':'false');}
      });
      answers.date=d.val;readyNext();
    });
    grid.appendChild(btn);
  });
  fs.appendChild(grid);wrap.appendChild(fs);wrap.appendChild(makeNextBtn('Continue'));
}

function buildTotQ(wrap,q){
  var fs=document.createElement('fieldset');fs.style.cssText='border:none;padding:0';
  var lg=document.createElement('legend');lg.className='sr-only';lg.textContent=q.label;fs.appendChild(lg);
  var row=document.createElement('div');row.className='tot-wrap';
  var L=makeTotCard(q.left,'a');L.id='tc-left';L.setAttribute('aria-pressed','false');
  L.addEventListener('click',function(){pickTot('left',q);});
  var sep=document.createElement('div');sep.className='or-sep';sep.textContent='or';sep.setAttribute('aria-hidden','true');
  var R=makeTotCard(q.right,'b');R.id='tc-right';R.setAttribute('aria-pressed','false');
  R.addEventListener('click',function(){pickTot('right',q);});
  row.appendChild(L);row.appendChild(sep);row.appendChild(R);
  fs.appendChild(row);wrap.appendChild(fs);
  if(q.chocSub){
    var cs=document.createElement('div');cs.className='choc-follow';cs.id='choc-follow';cs.setAttribute('aria-live','polite');
    wrap.appendChild(cs);
  }
  wrap.appendChild(makeNextBtn('Continue'));
}

function makeTotCard(opt,side){
  var btn=document.createElement('button');btn.className='tot-card';btn.setAttribute('type','button');
  btn.setAttribute('aria-label',opt.name+' — '+opt.hint);
  var mk=document.createElement('div');mk.className='pick-mark';mk.textContent='✓';mk.setAttribute('aria-hidden','true');
  btn.appendChild(mk);
  btn.innerHTML+='<span class="tot-icon" aria-hidden="true">'+opt.icon+'</span><span class="tot-name">'+opt.name+'</span><span class="tot-hint">'+opt.hint+'</span>';
  btn.insertBefore(mk,btn.firstChild);
  return btn;
}

function pickTot(side,q){
  var L=document.getElementById('tc-left');
  var R=document.getElementById('tc-right');
  if(L){L.className='tot-card'+(side==='left'?' picked-a':' dimmed');L.setAttribute('aria-pressed',side==='left'?'true':'false');}
  if(R){R.className='tot-card'+(side==='right'?' picked-b':' dimmed');R.setAttribute('aria-pressed',side==='right'?'true':'false');}
  answers[q.id]=side==='left'?q.left.val:q.right.val;
  if(q.chocSub){
    var cf=document.getElementById('choc-follow');
    if(cf){
      cf.innerHTML='';
      var items=null,labelTxt='',idPfx='';
      if(answers.gift==='chocolates'){items=CHOC;labelTxt='Which kind, though?';idPfx='cc-';}
      else if(answers.gift==='flowers'){items=FLOWERS;labelTxt='What kind of flowers?';idPfx='fc-';}
      if(items){
        var lbl=document.createElement('span');lbl.className='choc-label';
        var lid=idPfx+'label';lbl.id=lid;lbl.textContent=labelTxt;cf.appendChild(lbl);
        var cgrid=document.createElement('div');cgrid.className='choc-grid';
        cgrid.setAttribute('role','group');cgrid.setAttribute('aria-labelledby',lid);cf.appendChild(cgrid);
        items.forEach(function(c,i){
          var cc=document.createElement('button');cc.className='choc-card';cc.setAttribute('type','button');
          cc.id=idPfx+i;cc.setAttribute('aria-pressed','false');cc.setAttribute('aria-label',c.name+' — '+c.hint);
          cc.innerHTML='<span class="choc-icon" aria-hidden="true">'+c.icon+'</span><span class="choc-name">'+c.name+'</span><span class="choc-hint">'+c.hint+'</span>';
          cc.addEventListener('click',function(){
            items.forEach(function(_,j){
              var el=document.getElementById(idPfx+j);
              if(el){el.className='choc-card'+(j===i?' picked':'');el.setAttribute('aria-pressed',j===i?'true':'false');}
            });
            if(answers.gift==='chocolates'){answers.choc_type=c.val;answers.flower_type=null;}
            else{answers.flower_type=c.val;answers.choc_type=null;}
          });
          cgrid.appendChild(cc);
        });
        cf.classList.add('visible');
      } else {
        cf.classList.remove('visible');answers.choc_type=null;answers.flower_type=null;
      }
    }
  }
  readyNext();
}

function buildMultiQ(wrap,q){
  var fs=document.createElement('fieldset');fs.style.cssText='border:none;padding:0';
  var lg=document.createElement('legend');lg.className='sr-only';lg.textContent='Choose one';fs.appendChild(lg);
  var grid=document.createElement('div');grid.className='multi-grid';
  q.opts.forEach(function(o,i){
    var btn=document.createElement('button');btn.className='multi-card';btn.setAttribute('type','button');
    btn.id='mc-'+i;btn.setAttribute('aria-pressed','false');btn.setAttribute('aria-label',o.name+' — '+o.hint);
    btn.innerHTML='<span class="mc-icon" aria-hidden="true">'+o.icon+'</span><span class="mc-name">'+o.name+'</span><span class="mc-hint">'+o.hint+'</span>';
    btn.addEventListener('click',function(){
      q.opts.forEach(function(_,j){
        var el=document.getElementById('mc-'+j);
        if(el){el.className='multi-card'+(j===i?' picked':'');el.setAttribute('aria-pressed',j===i?'true':'false');}
      });
      answers[q.id]=o.val;readyNext();
    });
    grid.appendChild(btn);
  });
  fs.appendChild(grid);wrap.appendChild(fs);wrap.appendChild(makeNextBtn('Continue'));
}

function buildOpenQ(wrap,q){
  var lbl=document.createElement('label');lbl.setAttribute('for','open-field');
  lbl.className='sr-only';lbl.textContent=q.label;wrap.appendChild(lbl);
  var ta=document.createElement('textarea');
  ta.className='open-field';ta.id='open-field';ta.rows=3;ta.placeholder=q.placeholder;
  ta.setAttribute('aria-label',q.label);
  ta.addEventListener('input',function(){
    var nb=document.getElementById('next-btn');
    if(nb){nb.className='next-btn'+(ta.value.trim().length>1?' ready':'');nb.setAttribute('aria-disabled',ta.value.trim().length>1?'false':'true');}
  });
  wrap.appendChild(ta);wrap.appendChild(makeNextBtn('Read my invitation'));
}

function makeNextBtn(label){
  var btn=document.createElement('button');btn.className='next-btn';btn.id='next-btn';
  btn.setAttribute('type','button');btn.setAttribute('aria-disabled','true');btn.textContent=label;
  btn.addEventListener('click',advance);return btn;
}
function readyNext(){
  var nb=document.getElementById('next-btn');
  if(nb){nb.className='next-btn ready';nb.setAttribute('aria-disabled','false');}
}
function advance(){
  var q=QUESTIONS[currentQ];
  if(q.type==='open'){
    var f=document.getElementById('open-field');
    answers.happy=(f&&f.value.trim())?f.value.trim():'the little things';
  }
  currentQ++;
  if(currentQ>=TOTAL){startThinking();}
  else{renderQuestion();}
}

function startThinking(){
  showScreen('thinking');
  announce('Writing your invitation, please wait.');
  var t=document.getElementById('thinking');
  requestAnimationFrame(function(){requestAnimationFrame(function(){t.classList.add('visible');});});
  setTimeout(function(){
    t.classList.remove('visible');
    setTimeout(function(){buildResult();},600);
  },2800);
}

/* ─── LETTER GENERATOR ───────────────────────────────────────────────────────── */
function generateLetter(){
  var gift   = answers.gift    || 'flowers';
  var choc   = answers.choc_type;
  var flower = answers.flower_type;
  var food   = answers.food    || 'Italian';
  var timing = answers.timing  || 'dinner';
  var color  = answers.color   || 'warm and golden';
  var happy  = answers.happy   || 'the little things';
  var date   = answers.date    || 'this weekend';

  /* --- paragraph 1: arrival gift --- */
  var p1 = '';
  if(gift === 'flowers'){
    var ft = flower || 'flowers';
    p1 = 'I\'ve been thinking about '+ date +' and I want to tell you exactly how I want it to go. When you show up at my door, please bring me <strong>'+ ft +'</strong>. Not a huge bouquet — just something you actually thought about. The kind of thing that tells me you were thinking of me before you even left home.';
  } else {
    var ct = choc || 'chocolate';
    p1 = 'I\'ve been thinking about '+ date +' and I want to tell you exactly how I want it to go. When you show up, bring me <strong>'+ ct +'</strong> — from somewhere good, somewhere you actually went out of your way for. That\'s the kind of thing I notice.';
  }

  /* --- paragraph 2: the evening plan --- */
  var p2 = '';
  if(timing === 'walk'){
    p2 = 'Don\'t rush me straight to a table. Take me for a walk first — somewhere easy, no agenda, just us and a little unhurried time together. Then take me out for <strong>'+ food +' food</strong> — somewhere quiet enough that we can actually talk, and warm enough that we won\'t want to leave.';
  } else {
    p2 = 'Take me straight to dinner. I want <strong>'+ food +' food</strong> — somewhere with the right atmosphere, low light, a table that feels like it was set just for us. I want to sit down and feel like we have nowhere else to be.';
  }

  /* --- paragraph 3: the mood --- */
  var moodMap = {
    'warm and golden' : 'Make it feel <strong>warm</strong>. Golden light, amber tones, the kind of place where everything feels softer. I want to feel like the whole room was lit just for me.',
    'cool and calm'   : 'Keep it <strong>calm and unhurried</strong>. No noise, no rush. Take me somewhere that feels like the rest of the world has stepped back for the evening.',
    'soft and romantic': 'Make it feel <strong>soft</strong>. A little romantic — not over the top, just small things done with care. The kind of evening I\'ll remember not because it was grand, but because it felt like you were really trying.',
    'deep and intimate': 'I want it to feel <strong>close and private</strong>. Somewhere dark and warm, where we lean in to talk and it feels like the rest of the world doesn\'t exist.'
  };
  var p3 = moodMap[color] || 'Set the mood right. That matters more than you think.';

  /* --- paragraph 4: the special detail --- */
  var p4 = 'And one more thing — somewhere in the evening, find a way to fit in <strong>'+ happy +'</strong>. I may not say anything when it happens. But I will absolutely notice. And I\'ll remember it.';

  return { date: date, paragraphs: [p1, p2, p3, p4] };
}

/* ─── BUILD RESULT ─────────────────────────────────────────────────────────── */
function buildResult(){
  var letter = generateLetter();

  /* Date line */
  document.getElementById('letter-date').textContent = letter.date;

  /* Salutation */
  document.getElementById('letter-salutation').textContent = 'Hey you,';

  /* Body paragraphs */
  var bodyEl = document.getElementById('letter-body');
  bodyEl.innerHTML = '';
  letter.paragraphs.forEach(function(txt, i){
    var p = document.createElement('p');
    p.innerHTML = txt;
    p.id = 'lp-' + i;
    bodyEl.appendChild(p);
  });

  showScreen('result');
  document.getElementById('result').style.display = 'block';
  announce('Your invitation is ready. Read it, and if it feels right — send it to him.');

  var reveal = document.getElementById('plan-reveal');
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ reveal.classList.add('visible'); });
  });

  /* Stagger paragraphs */
  letter.paragraphs.forEach(function(_, i){
    setTimeout(function(){
      var p = document.getElementById('lp-' + i);
      if(p) p.classList.add('visible');
    }, 400 + i * 220);
  });

  var totalDelay = 400 + letter.paragraphs.length * 220;

  setTimeout(function(){
    var d = document.getElementById('letter-divider');
    if(d) d.classList.add('visible');
  }, totalDelay + 100);

  setTimeout(function(){
    var so = document.getElementById('letter-signoff');
    if(so) so.classList.add('visible');
  }, totalDelay + 280);

  setTimeout(function(){
    var sig = document.getElementById('letter-signature');
    if(sig) sig.classList.add('visible');
    var sub = document.getElementById('sig-sub');
    if(sub) sub.style.opacity = '1';
  }, totalDelay + 480);

  setTimeout(function(){
    var seal = document.getElementById('wax-seal');
    if(seal) seal.classList.add('visible');
    var rw = document.getElementById('send-section');
    if(rw) rw.classList.add('visible');
  }, totalDelay + 700);
}

/* ─── SHARE AS IMAGE ─────────────────────────────────────────────────────────── */

document.getElementById('share-btn-wa').addEventListener('click', function(){
  var sealBtn = document.getElementById('share-btn-wa');
  var sealWrap = document.getElementById('wax-seal');

  // Hide the seal during capture so it doesn't appear in image
  sealWrap.style.display = 'none';

  var el = document.getElementById('letter-wrapper');

  showToast('Creating image…');

  html2canvas(el, {
    backgroundColor: '#16100c',
    scale: 2,
    useCORS: true,
    logging: false,
    width: el.offsetWidth,
    height: el.offsetHeight
  }).then(function(canvas){
    sealWrap.style.display = '';

    canvas.toBlob(function(blob){
      if(!blob){ showToast('Could not create image. Try a screenshot!'); return; }
      var file = new File([blob], 'my-evening.png', {type:'image/png'});

      if(navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({
          files: [file],
          title: 'My perfect evening',
          text: 'I filled this in for you. Read it.'
        }).catch(function(){});
      } else {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = 'my-evening.png'; a.click();
        setTimeout(function(){
          URL.revokeObjectURL(url);
          window.open('https://wa.me/', '_blank');
        }, 800);
        showToast('Image saved! Attach it in WhatsApp 💌');
      }
    }, 'image/png');
  }).catch(function(){
    sealWrap.style.display = '';
    showToast('Try taking a screenshot instead 📸');
  });
});

document.getElementById('restart-btn').addEventListener('click',function(){
  answers = {}; currentQ = 0;
  document.getElementById('plan-reveal').classList.remove('visible');
  document.getElementById('send-section').classList.remove('visible');
  document.getElementById('letter-divider').classList.remove('visible');
  document.getElementById('letter-signoff').classList.remove('visible');
  document.getElementById('letter-signature').classList.remove('visible');
  document.getElementById('wax-seal').classList.remove('visible');
  document.getElementById('wax-seal').style.display = '';
  document.getElementById('sig-sub').style.opacity = '0';
  showScreen('intro');
  var intro = document.getElementById('intro');
  intro.style.display = 'block'; intro.classList.add('active');
  intro.removeAttribute('aria-hidden');
  setTimeout(function(){ intro.classList.add('visible'); }, 50);
  announce('Restarted.');
});

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3500);
}
</script>
